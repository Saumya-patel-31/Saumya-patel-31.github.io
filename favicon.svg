<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background, matches portfolio's dark canvas -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0a0d14"/>

  <!-- Subtle inner glow ring -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5" ry="6.5"
        fill="none" stroke="#ff5a2e" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Stylised S — drawn as a path so it renders crisply at 16px -->
  <path d="M 22.5 9.5
           C 22.5 7.2, 20.2 5.8, 16.5 5.8
           C 12.8 5.8, 10.5 7.4, 10.5 9.8
           C 10.5 12.0, 12.5 13.0, 16.0 13.7
           C 19.6 14.4, 22.0 15.5, 22.0 18.5
           C 22.0 21.2, 19.4 23.0, 15.5 23.0
           C 11.6 23.0, 9.0 21.4, 9.0 18.8"
        fill="none"
        stroke="#ff5a2e"
        stroke-width="3.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Vertical bar that turns the S into a $ glyph -->
  <line x1="16" y1="3.4" x2="16" y2="28.6"
        stroke="#ff5a2e"
        stroke-width="2.6"
        stroke-linecap="round"/>
</svg>
